services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "8888:8888"   # métriques internes (scrapées par Prometheus)
    volumes:
      - ./infra/otel/config.yml:/etc/otel/config.yml
    command: ["--config=/etc/otel/config.yml"]
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.5.0
    ports:
      - "3200:3200"   # API/UI
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/tempo.yml
    command: ["-config.file=/etc/tempo/tempo.yml"]

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - tempo

  loki:
    image: grafana/loki:3.1.0
    ports:
      - "3110:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml
    command: ["-config.file=/etc/loki/loki-config.yml"]

  promtail:
    image: grafana/promtail:3.1.0
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    depends_on:
      - loki

volumes:
  prometheus_data:
  grafana_data:
